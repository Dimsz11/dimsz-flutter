name: Flutter Build APK (With Inputs)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file (opsional)'
        required: false
        type: string
      tag:
        description: 'Tag release (opsional)'
        required: false
        type: string
      build_type:
        description: 'Tipe build'
        required: false
        type: choice
        options:
          - release
          - debug
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: 📦 Checkout Repository
      uses: actions/checkout@v4

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 🐦 Setup Flutter
      run: |
        wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz
        tar -xf flutter_linux_3.24.5-stable.tar.xz -C /opt/
        echo "/opt/flutter/bin" >> $GITHUB_PATH
        echo "FLUTTER_ROOT=/opt/flutter" >> $GITHUB_ENV
        /opt/flutter/bin/flutter --version

    - name: 🔧 Fix pubspec.yaml
      run: |
        if [ -f pubspec.yaml ]; then
          sed -i 's/sdk: .*/sdk: ">=2.19.0 <4.0.0"/g' pubspec.yaml
          echo "✅ pubspec.yaml fixed"
        fi

    - name: 📥 Download ZIP (jika ada)
      if: github.event.inputs.zip_url != ''
      run: |
        curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
        unzip -o project.zip -d .

    - name: 🧹 Flutter Clean
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter clean

    - name: 📦 Flutter Pub Get
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter pub get

    - name: 🏗️ Build APK
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
          flutter build apk --debug
        else
          flutter build apk --release --split-per-abi
        fi

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: |
          build/app/outputs/flutter-apk/*.apk
        retention-days: 7

    - name: 🚀 Upload to Release
      if: github.event.inputs.tag != ''
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/*.apk
        tag_name: ${{ github.event.inputs.tag }}
        name: Release ${{ github.event.inputs.tag }}
        body: "🚀 Auto build dari GitHub Actions"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

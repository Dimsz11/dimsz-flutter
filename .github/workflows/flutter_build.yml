name: Flutter Build APK (Universal)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    # ===== 1. CHECKOUT REPO =====
    - name: 📦 Checkout Repository
      uses: actions/checkout@v4

    # ===== 2. SETUP JAVA =====
    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # ===== 3. SETUP FLUTTER (UNIVERSAL) =====
    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.4'  # Bisa diubah sesuai kebutuhan
        channel: 'stable'

    # ===== 4. FIX PUBSPEC (AUTO) =====
    - name: 🔧 Fix pubspec.yaml (Universal SDK)
      run: |
        if [ -f pubspec.yaml ]; then
          sed -i 's/sdk: .*/sdk: ">=2.19.0 <4.0.0"/g' pubspec.yaml
          echo "✅ pubspec.yaml fixed to universal SDK"
        fi

    # ===== 5. FLUTTER CLEAN =====
    - name: 🧹 Flutter Clean
      run: flutter clean

    # ===== 6. FLUTTER PUB GET =====
    - name: 📦 Flutter Pub Get
      run: flutter pub get

    # ===== 7. BUILD APK =====
    - name: 🏗️ Build APK
      run: flutter build apk --release --split-per-abi

    # ===== 8. UPLOAD APK =====
    - name: 📤 Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: |
          build/app/outputs/flutter-apk/*.apk
        retention-days: 7

    # ===== 9. UPLOAD RELEASE (OPTIONAL) =====
    - name: 🚀 Upload to Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/*.apk
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: "🚀 Auto build dari GitHub Actions (Universal SDK)"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

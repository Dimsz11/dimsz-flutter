# ============================================================
# FILE: .github/workflows/build-apk.yml (LENGKAP - SUPPORT zip_url)
# ============================================================

name: Build APK from ZIP

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file (Direct download link)'
        required: true
        type: string
        default: ''
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'
        type: string
      build_type:
        description: 'Build type (release/debug/profile)'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - debug
          - profile
      tag:
        description: 'Tag name for APK'
        required: false
        default: 'app'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Download and extract ZIP
      run: |
        echo "📥 Downloading ZIP from: ${{ github.event.inputs.zip_url }}"
        curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
        unzip -o project.zip -d project/
        ls -la project/

    - name: Move project files
      run: |
        # Pindahkan semua file ke root
        if [ -d "project" ]; then
          shopt -s dotglob
          mv project/* ./ || true
          mv project/.* ./ || true
          rm -rf project
        fi
        ls -la

    - name: Install dependencies
      run: flutter pub get

    - name: Clean build
      run: flutter clean

    - name: Build APK (${{ github.event.inputs.build_type }})
      run: flutter build apk --${{ github.event.inputs.build_type }}

    - name: Rename APK
      run: |
        # Cari file APK
        APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -n 1)
        if [ -f "$APK_PATH" ]; then
          mv "$APK_PATH" "build/app/outputs/flutter-apk/${{ github.event.inputs.tag }}.apk"
          echo "✅ APK renamed to ${{ github.event.inputs.tag }}.apk"
        else
          echo "❌ APK not found!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.tag }}
        path: build/app/outputs/flutter-apk/*.apk

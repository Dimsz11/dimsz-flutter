name: Flutter Build APK (FIXED)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: 📦 Checkout
      uses: actions/checkout@v4

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 🐦 Setup Flutter
      run: |
        wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz
        tar -xf flutter_linux_3.24.5-stable.tar.xz -C /opt/
        echo "/opt/flutter/bin" >> $GITHUB_PATH
        echo "FLUTTER_ROOT=/opt/flutter" >> $GITHUB_ENV
        /opt/flutter/bin/flutter --version

    - name: 📥 Download ZIP (jika ada)
      if: github.event.inputs.zip_url != ''
      run: |
        curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
        unzip -o project.zip -d .
        echo "✅ ZIP extracted"

    - name: 🔍 Cari pubspec.yaml
      run: |
        echo "📂 Semua pubspec.yaml:"
        find . -name "pubspec.yaml" -type f

    - name: 🔧 FORCE FIX pubspec.yaml
      run: |
        find . -name "pubspec.yaml" -type f | while read file; do
          echo "📄 Fixing: $file"
          cp "$file" "$file.bak"
          python3 << EOF
import re
with open("$file", "r") as f:
    content = f.read()
content = re.sub(r'sdk: \^3\.8\.1', 'sdk: ">=2.19.0 <4.0.0"', content)
content = re.sub(r'sdk: ">=3\.8\.1"', 'sdk: ">=2.19.0 <4.0.0"', content)
content = re.sub(r'sdk: ">=3\.8\.1 <4\.0\.0"', 'sdk: ">=2.19.0 <4.0.0"', content)
with open("$file", "w") as f:
    f.write(content)
print("✅ Fixed: $file")
EOF
          grep -A2 "environment:" "$file" || echo "⚠️ No environment"
        done

    - name: 🧹 Flutter Clean
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter clean

    - name: 📦 Flutter Pub Get
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter pub get

    - name: 🏗️ Build APK
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter build apk --release --split-per-abi

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: |
          build/app/outputs/flutter-apk/*.apk
        retention-days: 7

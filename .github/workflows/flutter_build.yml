name: Flutter Build APK (Universal)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file (opsional)'
        required: false
        type: string
      tag:
        description: 'Tag release (opsional)'
        required: false
        type: string
      build_type:
        description: 'Tipe build (release/debug)'
        required: false
        type: choice
        options:
          - release
          - debug
        default: 'release'
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: 📦 Checkout Repository
      uses: actions/checkout@v4

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 🐦 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.4'
        channel: 'stable'

    - name: 🔧 Fix pubspec.yaml (Universal SDK)
      run: |
        if [ -f pubspec.yaml ]; then
          sed -i 's/sdk: .*/sdk: ">=2.19.0 <4.0.0"/g' pubspec.yaml
          echo "✅ pubspec.yaml fixed"
        fi

    # ===== KALO ADA ZIP_URL, DOWNLOAD & EKSTRAK =====
    - name: 📥 Download ZIP from URL
      if: github.event.inputs.zip_url != ''
      run: |
        curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
        unzip -o project.zip -d .
        echo "✅ ZIP downloaded and extracted"

    - name: 🧹 Flutter Clean
      run: flutter clean

    - name: 📦 Flutter Pub Get
      run: flutter pub get

    - name: 🏗️ Build APK
      run: |
        if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
          flutter build apk --debug
        else
          flutter build apk --release --split-per-abi
        fi

    - name: 📤 Upload APK Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: |
          build/app/outputs/flutter-apk/*.apk
        retention-days: 7

    - name: 🚀 Upload to Release
      if: github.event.inputs.tag != ''
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/*.apk
        tag_name: ${{ github.event.inputs.tag }}
        name: Release ${{ github.event.inputs.tag }}
        body: "🚀 Auto build dari GitHub Actions"
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

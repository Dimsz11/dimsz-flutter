name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL zip project Flutter'
        required: true
        type: string
      tag:
        description: 'Release tag'
        required: true
        type: string
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'   // <-- PAKE VERSI 3.24.0
          channel: 'stable'
          cache: true

      - name: Download project
        run: |
          echo "📥 Downloading from ${{ github.event.inputs.zip_url }}"
          curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
          unzip -o project.zip -d project/
          echo "📂 Project files:"
          ls -la project/

      - name: Find Flutter root
        id: find_root
        run: |
          cd project
          if [ -f "pubspec.yaml" ]; then
            echo "root=." >> $GITHUB_OUTPUT
          else
            ROOT=$(find . -maxdepth 3 -name "pubspec.yaml" | head -1 | xargs dirname)
            if [ -n "$ROOT" ]; then
              echo "root=$ROOT" >> $GITHUB_OUTPUT
            else
              echo "❌ pubspec.yaml NOT FOUND!"
              exit 1
            fi
          fi

      - name: Install dependencies
        run: |
          cd project/${{ steps.find_root.outputs.root }}
          flutter clean || echo "⚠️ Clean warning"
          flutter pub get || exit 1

      - name: Build APK
        run: |
          cd project/${{ steps.find_root.outputs.root }}
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug || exit 1
          else
            flutter build apk --release || exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.tag }}
          path: project/${{ steps.find_root.outputs.root }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

name: Flutter Build APK (REAL FIX)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: false
        type: string
      tag:
        description: 'Tag release'
        required: false
        type: string
      build_type:
        description: 'Tipe build'
        required: false
        type: choice
        options:
          - release
          - debug
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      run: |
        wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz
        tar -xf flutter_linux_3.24.5-stable.tar.xz -C /opt/
        echo "/opt/flutter/bin" >> $GITHUB_PATH
    
    - name: Download & Extract ZIP
      if: github.event.inputs.zip_url != ''
      run: |
        curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
        unzip -o project.zip -d .
    
    - name: 🔧 FIX PUBSPEC (FORMAT BENER)
      run: |
        echo "🔍 Mencari pubspec.yaml..."
        find . -name "pubspec.yaml" -type f -print
        
        echo ""
        echo "🔧 Memperbaiki format..."
        python3 << 'EOF'
import os
import re

for root, dirs, files in os.walk('.'):
    for file in files:
        if file == 'pubspec.yaml':
            path = os.path.join(root, file)
            print(f"📄 Fixing: {path}")
            
            with open(path, 'r') as f:
                content = f.read()
            
            # 1. Fix environment.sdk
            content = re.sub(r'sdk: .*', 'sdk: ">=2.19.0 <4.0.0"', content, flags=re.MULTILINE)
            
            # 2. Fix flutter_test (HARUS sdk: flutter)
            content = re.sub(
                r'flutter_test:\s*\n\s*sdk:.*',
                'flutter_test:\n    sdk: flutter',
                content
            )
            
            with open(path, 'w') as f:
                f.write(content)
            
            print(f"✅ Fixed: {path}")
EOF
        
        echo ""
        echo "✅ Hasil fix:"
        find . -name "pubspec.yaml" -type f -exec cat {} \;
    
    - name: Build APK
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter clean
        flutter pub get
        flutter build apk --release --split-per-abi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 7

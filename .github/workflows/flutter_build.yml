name: Build APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: false
        default: 'main'
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
      tag:
        description: 'Tag version'
        required: false
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Clean build
      run: flutter clean

    - name: Build APK (${{ github.event.inputs.build_type }})
      run: flutter build apk --${{ github.event.inputs.build_type }}

    - name: Rename APK
      run: |
        mv build/app/outputs/flutter-apk/app-${{ github.event.inputs.build_type }}.apk build/app/outputs/flutter-apk/${{ github.event.inputs.tag }}.apk || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.tag }}
        path: build/app/outputs/flutter-apk/*.apk

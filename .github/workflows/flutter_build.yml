name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: false
        type: string
      tag:
        description: 'Tag release'
        required: false
        type: string
      build_type:
        description: 'Tipe build'
        required: false
        type: choice
        options:
          - release
          - debug
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      run: |
        wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz
        tar -xf flutter_linux_3.24.5-stable.tar.xz -C /opt/
        echo "/opt/flutter/bin" >> $GITHUB_PATH
    
    - name: Download & Extract ZIP
      if: github.event.inputs.zip_url != ''
      run: |
        curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
        unzip -o project.zip -d .
        echo "✅ ZIP extracted"
    
    - name: 🔧 FORCE FIX ALL pubspec.yaml
      run: |
        echo "🔍 Mencari semua pubspec.yaml..."
        find . -name "pubspec.yaml" -type f -print
        
        echo ""
        echo "🔧 Memperbaiki semua pubspec.yaml..."
        find . -name "pubspec.yaml" -type f -exec sed -i 's/sdk: \^3\.8\.1/sdk: ">=2.19.0 <4.0.0"/g' {} \;
        find . -name "pubspec.yaml" -type f -exec sed -i 's/sdk: ">=3\.8\.1"/sdk: ">=2.19.0 <4.0.0"/g' {} \;
        find . -name "pubspec.yaml" -type f -exec sed -i 's/sdk: ">=3\.8\.1 <4\.0\.0"/sdk: ">=2.19.0 <4.0.0"/g' {} \;
        
        echo ""
        echo "✅ Hasil fix:"
        find . -name "pubspec.yaml" -type f -exec grep -A2 "environment:" {} \;
    
    - name: Build APK
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter clean
        flutter pub get
        flutter build apk --release --split-per-abi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 7

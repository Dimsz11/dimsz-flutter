name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: 📦 Checkout Repository
      uses: actions/checkout@v4

    - name: ☕ Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 🐦 Setup Flutter
      run: |
        wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz
        tar -xf flutter_linux_3.24.5-stable.tar.xz -C /opt/
        echo "/opt/flutter/bin" >> $GITHUB_PATH
        echo "FLUTTER_ROOT=/opt/flutter" >> $GITHUB_ENV
        /opt/flutter/bin/flutter --version

    - name: 🔧 Fix pubspec.yaml
      run: |
        if [ -f pubspec.yaml ]; then
          sed -i 's/sdk: .*/sdk: ">=2.19.0 <4.0.0"/g' pubspec.yaml
          echo "✅ pubspec.yaml fixed"
        fi

    - name: 📥 Download ZIP (jika ada)
      if: github.event.inputs.zip_url != ''
      run: |
        curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
        unzip -o project.zip -d .

    - name: 🧹 Flutter Clean
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter clean

    - name: 📦 Flutter Pub Get
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter pub get

    - name: 🏗️ Build APK
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter build apk --release --split-per-abi

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: |
          build/app/outputs/flutter-apk/*.apk
        retention-days: 7

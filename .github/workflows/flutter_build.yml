# ============================================================
# FILE: .github/workflows/build-apk.yml
# ============================================================

name: Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL file ZIP project Flutter'
        required: true
        type: string
      tag:
        description: 'Tag/Nama file APK'
        required: true
        type: string
        default: 'app'
      build_type:
        description: 'Type Build'
        required: true
        type: choice
        options:
          - release
          - debug
          - profile
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Download ZIP
      run: |
        echo "📥 Download from: ${{ github.event.inputs.zip_url }}"
        curl -L -o project.zip "${{ github.event.inputs.zip_url }}"
        unzip -o project.zip -d project/
        ls -la project/

    - name: Move to root
      run: |
        if [ -d "project" ]; then
          shopt -s dotglob
          mv project/* ./ 2>/dev/null || true
          mv project/.* ./ 2>/dev/null || true
          rm -rf project
        fi
        ls -la

    - name: Install dependencies
      run: flutter pub get

    - name: Clean
      run: flutter clean

    - name: Build APK
      run: flutter build apk --${{ github.event.inputs.build_type }}

    - name: Rename APK
      run: |
        APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -n 1)
        if [ -f "$APK_PATH" ]; then
          mv "$APK_PATH" "build/app/outputs/flutter-apk/${{ github.event.inputs.tag }}.apk"
          echo "✅ APK renamed to ${{ github.event.inputs.tag }}.apk"
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.tag }}
        path: build/app/outputs/flutter-apk/*.apk

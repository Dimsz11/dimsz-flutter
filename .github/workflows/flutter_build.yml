name: Flutter Build APK (FIXED)

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP file'
        required: false
        type: string
      tag:
        description: 'Tag release'
        required: false
        type: string
      build_type:
        description: 'Tipe build'
        required: false
        type: choice
        options:
          - release
          - debug
        default: 'release'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      run: |
        wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz
        tar -xf flutter_linux_3.24.5-stable.tar.xz -C /opt/
        echo "/opt/flutter/bin" >> $GITHUB_PATH
    
    - name: Download & Extract ZIP
      if: github.event.inputs.zip_url != ''
      run: |
        curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
        unzip -o project.zip -d .
    
    - name: 🔧 FIX PUBSPEC & GEOLOCATOR
      run: |
        # 1. Fix pubspec SDK
        find . -name "pubspec.yaml" -type f -exec sed -i 's/sdk: .*/sdk: ">=2.19.0 <4.0.0"/g' {} \;
        
        # 2. FIX GEOLOCATOR_ANDROID (PASTI KENA)
        GRADLE_FILE=$(find . -path "*/geolocator_android-*/android/build.gradle" 2>/dev/null | head -1)
        if [ -f "$GRADLE_FILE" ]; then
          echo "📄 Fixing geolocator_android: $GRADLE_FILE"
          sed -i '/android {/a \    compileSdk 34' "$GRADLE_FILE"
          echo "✅ Fixed!"
        fi
        
        # 3. Fix semua plugin yang ga punya compileSdk
        find . -name "build.gradle" -path "*/android/*" -type f | while read file; do
          if ! grep -q "compileSdk" "$file"; then
            echo "📄 Adding compileSdk to: $file"
            sed -i '/android {/a \    compileSdk 34' "$file"
          fi
        done
    
    - name: Build APK
      run: |
        export PATH="/opt/flutter/bin:$PATH"
        flutter clean
        flutter pub get
        flutter build apk --release --split-per-abi
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: build/app/outputs/flutter-apk/*.apk
        retention-days: 7
    
    - name: Upload to Release
      if: github.event.inputs.tag != ''
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/app/outputs/flutter-apk/*.apk
        tag_name: ${{ github.event.inputs.tag }}
        name: Release ${{ github.event.inputs.tag }}
        body: "🚀 Auto build fixed!"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Flutter Build APK

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL zip project Flutter'
        required: true
        type: string
      tag:
        description: 'Release tag'
        required: true
        type: string
      build_type:
        description: 'Build type (release/debug)'
        required: false
        default: 'release'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Download project
        run: |
          echo "📥 Downloading project from ${{ inputs.zip_url }}"
          curl -L -o project.zip "${{ inputs.zip_url }}"
          unzip -q project.zip -d project
          ls -la project/

      - name: Find Flutter project root
        id: find_root
        run: |
          cd project
          # Cari pubspec.yaml di root atau di dalam folder
          if [ -f "pubspec.yaml" ]; then
            echo "root=." >> $GITHUB_OUTPUT
          elif [ -f "*/pubspec.yaml" ]; then
            ROOT=$(find . -maxdepth 2 -name "pubspec.yaml" | head -1 | xargs dirname)
            echo "root=$ROOT" >> $GITHUB_OUTPUT
          else
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi

      - name: Flutter clean & pub get
        run: |
          cd project/${{ steps.find_root.outputs.root }}
          flutter clean
          flutter pub get

      - name: Build APK
        run: |
          cd project/${{ steps.find_root.outputs.root }}
          if [ "${{ inputs.build_type }}" == "debug" ]; then
            flutter build apk --debug
          else
            flutter build apk --release
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: project/${{ steps.find_root.outputs.root }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: Upload to release (optional)
        if: success()
        run: |
          cd project/${{ steps.find_root.outputs.root }}
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ -f "$APK_PATH" ]; then
            echo "✅ APK found: $APK_PATH"
            ls -la "$APK_PATH"
          else
            echo "❌ APK not found!"
            exit 1
          fi
